<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pitch Corrector</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: #eee;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            margin: 0;
        }
        h1 { font-size: 1.4em; margin: 5px 0; }
        h3 { font-size: 1em; margin: 5px 0; }
        canvas { border: 1px solid #444; margin: 5px 0; width: 100%; max-width: 1200px; cursor: pointer; }
        .controls { display: flex; gap: 8px; align-items: center; margin: 5px 0; flex-wrap: wrap; justify-content: center; }
        button {
            background: #16213e;
            color: #eee;
            border: 1px solid #555;
            padding: 8px 12px;
            cursor: pointer;
            font-family: monospace;
            font-size: 14px;
            touch-action: manipulation;
        }
        button:hover { background: #0f3460; }
        button.active { background: #e94560; border-color: #e94560; }
        .btn-group { display: flex; gap: 0; flex-wrap: wrap; }
        .btn-group button { border-radius: 0; border-right: none; opacity: 0.5; }
        .btn-group button:last-child { border-right: 1px solid #555; }
        .btn-group button.active { opacity: 1; background: #e94560; border-color: #e94560; }
        #status { color: #888; margin: 5px 0; font-size: 0.9em; }
        .section { margin: 5px 0; text-align: center; width: 100%; max-width: 1200px; }
        .note-grid { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; }
        .note-grid button { min-width: 36px; padding: 6px 8px; font-size: 12px; }
        input[type=range] { width: 100%; max-width: 300px; accent-color: #e94560; }
        .shift-display { font-size: 18px; min-width: 60px; text-align: center; }
        select { background: #16213e; color: #eee; border: 1px solid #555; padding: 6px; font-family: monospace; }
    </style>
</head>
<body>
    <h1>🎤 Pitch Corrector</h1>
    <div id="status">Click Record to begin</div>
    <div class="controls">
        <button id="record-btn">⏺ Record</button>
        <button id="stop-btn" disabled>⏹ Stop</button>
        <button id="play-btn" style="display:none">▶ Play</button>
        <button id="sweep-btn" disabled>🎵 Sine Sweep</button>
    </div>

    <div class="section">
        <div class="controls" id="scale-buttons">
            <button data-scale="off">Off</button>
            <button data-scale="chromatic">Chromatic</button>
            <button data-scale="major">Major</button>
            <button data-scale="minor">Minor</button>
            <button data-scale="pentatonic" class="active">Pentatonic</button>
            <button data-scale="custom">Custom</button>
        </div>
    </div>

    <div class="section">
        <div class="controls">
            Root:
            <select id="root-select">
                <option value="0" selected>C</option>
                <option value="1">C#</option>
                <option value="2">D</option>
                <option value="3">D#</option>
                <option value="4">E</option>
                <option value="5">F</option>
                <option value="6">F#</option>
                <option value="7">G</option>
                <option value="8">G#</option>
                <option value="9">A</option>
                <option value="10">A#</option>
                <option value="11">B</option>
            </select>
        </div>
    </div>

    <div class="section" id="custom-notes" style="display:none">
        <div class="note-grid" id="note-grid"></div>
    </div>

    <div class="section">
        <div class="controls">
            <span>Shift:</span>
            <input type="range" id="shift-slider" min="-12" max="12" value="0" step="1">
            <span class="shift-display" id="shift-display">0 st</span>
        </div>
    </div>

    <div class="section">
        <div class="controls">
            <h3>Input</h3>
            <div class="btn-group" id="input-view-group">
                <button data-view="spectrogram" class="active">Spectrogram</button>
                <button data-view="pitch">Pitch Contour</button>
            </div>
        </div>
    </div>
    <canvas id="input-spectrogram" width="1200" height="200"></canvas>
    <canvas id="input-contour" width="1200" height="200" style="display:none"></canvas>

    <div class="section">
        <div class="controls">
            <h3>Output</h3>
            <div class="btn-group" id="output-view-group">
                <button data-view="spectrogram" class="active">Spectrogram</button>
                <button data-view="pitch">Pitch Contour</button>
            </div>
        </div>
    </div>
    <canvas id="output-spectrogram" width="1200" height="200"></canvas>
    <canvas id="output-contour" width="1200" height="200" style="display:none"></canvas>

    <script type="module">
        import init, { WebPitchCorrector } from './pkg/pitch_corrector.js';

        const noteNames = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
        let corrector = null;
        let animFrame = null;
        let columnX = 0;
        let recordedColumns = 0; // how many columns were drawn during recording
        let currentScale = 'pentatonic';
        let customBits = 0xFFF;
        let isRecording = false;

        // Build custom note grid
        const noteGrid = document.getElementById('note-grid');
        noteNames.forEach((name, i) => {
            const btn = document.createElement('button');
            btn.textContent = name;
            btn.dataset.note = i;
            btn.classList.add('active');
            btn.addEventListener('click', () => {
                btn.classList.toggle('active');
                customBits = 0;
                noteGrid.querySelectorAll('button.active').forEach(b => {
                    customBits |= (1 << parseInt(b.dataset.note));
                });
                if (corrector && currentScale === 'custom') {
                    corrector.set_notes(customBits);
                }
            });
            noteGrid.appendChild(btn);
        });

        function applyScale() {
            if (!corrector) return;
            const root = parseInt(document.getElementById('root-select').value);
            if (currentScale === 'custom') {
                corrector.set_notes(customBits);
            } else {
                corrector.set_notes(WebPitchCorrector.scale_bits(currentScale, root));
            }
        }

        // Scale buttons
        document.querySelectorAll('#scale-buttons button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#scale-buttons button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentScale = btn.dataset.scale;
                document.getElementById('custom-notes').style.display =
                    currentScale === 'custom' ? 'block' : 'none';
                applyScale();
            });
        });

        document.getElementById('root-select').addEventListener('change', applyScale);

        const slider = document.getElementById('shift-slider');
        const shiftDisplay = document.getElementById('shift-display');
        slider.addEventListener('input', () => {
            const v = parseFloat(slider.value);
            shiftDisplay.textContent = (v >= 0 ? '+' : '') + v + ' st';
            if (corrector) corrector.set_shift(v);
        });

        const allCanvasIds = ['input-spectrogram','input-contour','output-spectrogram','output-contour'];

        function drawPlayhead(canvas, x) {
            const ctx = canvas.getContext('2d');
            ctx.strokeStyle = '#ff0';
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, canvas.height);
            ctx.stroke();
        }

        // --- Recording ---
        async function startRecording() {
            await init();
            try {
                corrector = new WebPitchCorrector();
                applyScale();
                corrector.set_shift(parseFloat(slider.value));
                isRecording = true;

                document.getElementById('status').textContent = '🔴 Recording...';
                document.getElementById('record-btn').disabled = true;
                document.getElementById('stop-btn').disabled = false;
                document.getElementById('play-btn').style.display = 'none';
                document.getElementById('sweep-btn').disabled = false;

                allCanvasIds.forEach(id => {
                    const c = document.getElementById(id);
                    c.getContext('2d').clearRect(0, 0, c.width, c.height);
                });
                columnX = 0;
                recordedColumns = 0;

                const inputSpec = document.getElementById('input-spectrogram');
                const inputContour = document.getElementById('input-contour');
                const outputSpec = document.getElementById('output-spectrogram');
                const outputContour = document.getElementById('output-contour');

                function draw() {
                    if (!corrector || !isRecording) return;
                    corrector.draw_spectrogram(outputSpec, columnX);
                    corrector.draw_input_spectrogram(inputSpec, columnX);
                    corrector.draw_pitch_contour(outputContour, columnX);
                    corrector.draw_input_contour(inputContour, columnX);
                    columnX = (columnX + 1) % outputSpec.width;
                    recordedColumns++;
                    [inputSpec, inputContour, outputSpec, outputContour].forEach(c => drawPlayhead(c, (columnX + 1) % c.width));
                    animFrame = requestAnimationFrame(draw);
                }
                draw();
            } catch (e) {
                document.getElementById('status').textContent = 'Error: ' + e;
            }
        }

        function stopRecording() {
            isRecording = false;
            if (animFrame) cancelAnimationFrame(animFrame);
            animFrame = null;

            document.getElementById('stop-btn').disabled = true;
            document.getElementById('sweep-btn').disabled = true;
            document.getElementById('record-btn').disabled = false;

            if (corrector && corrector.recording_len() > 0) {
                corrector.stop();
                document.getElementById('status').textContent = 'Recording saved. Click Play or click on the spectrogram to seek.';
                document.getElementById('play-btn').style.display = '';
            } else {
                if (corrector) corrector.stop();
                document.getElementById('status').textContent = 'Stopped (no recording)';
            }
        }

        // --- Playback ---
        let playbackAnimFrame = null;
        // Per-canvas: saved 1px column under the playhead
        const savedColumns = {};
        let lastPlayheadX = -1;

        function drawPlaybackHead() {
            if (!corrector) return;
            const x = playbackX();

            // Restore previous playhead column
            if (lastPlayheadX >= 0) {
                allCanvasIds.forEach(id => {
                    const c = document.getElementById(id);
                    if (savedColumns[id]) {
                        c.getContext('2d').putImageData(savedColumns[id], lastPlayheadX, 0);
                    }
                });
            }

            // Save column at new position, then draw playhead
            allCanvasIds.forEach(id => {
                const c = document.getElementById(id);
                if (c.style.display === 'none') return;
                const ctx = c.getContext('2d');
                savedColumns[id] = ctx.getImageData(x, 0, 1, c.height);
                drawPlayhead(c, x);
            });
            lastPlayheadX = x;

            if (corrector.is_playing()) {
                playbackAnimFrame = requestAnimationFrame(drawPlaybackHead);
            } else {
                // Restore last column
                if (lastPlayheadX >= 0) {
                    allCanvasIds.forEach(id => {
                        const c = document.getElementById(id);
                        if (savedColumns[id]) {
                            c.getContext('2d').putImageData(savedColumns[id], lastPlayheadX, 0);
                        }
                    });
                    lastPlayheadX = -1;
                }
                document.getElementById('play-btn').textContent = '▶ Play';
                document.getElementById('status').textContent = 'Playback finished. Click Play or click spectrogram to seek.';
                document.getElementById('record-btn').disabled = false;
            }
        }

        function startPlayback() {
            if (!corrector || corrector.recording_len() === 0) return;
            corrector.play_recording();
            document.getElementById('play-btn').textContent = '⏸ Pause';
            document.getElementById('status').textContent = '▶ Playing...';
            document.getElementById('record-btn').disabled = true;
            if (playbackAnimFrame) cancelAnimationFrame(playbackAnimFrame);
            drawPlaybackHead();
        }

        function stopPlayback() {
            if (!corrector) return;
            corrector.stop_playback();
            if (playbackAnimFrame) cancelAnimationFrame(playbackAnimFrame);
            playbackAnimFrame = null;
            // Restore column under playhead
            if (lastPlayheadX >= 0) {
                allCanvasIds.forEach(id => {
                    const c = document.getElementById(id);
                    if (savedColumns[id]) {
                        c.getContext('2d').putImageData(savedColumns[id], lastPlayheadX, 0);
                    }
                });
                lastPlayheadX = -1;
            }
            document.getElementById('play-btn').textContent = '▶ Play';
            document.getElementById('status').textContent = 'Paused. Click Play to resume or click spectrogram to seek.';
            document.getElementById('record-btn').disabled = false;
        }

        document.getElementById('play-btn').addEventListener('click', () => {
            if (corrector && corrector.is_playing()) {
                stopPlayback();
            } else {
                startPlayback();
            }
        });

        // --- Seek on canvas click ---
        function handleCanvasClick(e) {
            if (!corrector || corrector.recording_len() === 0 || isRecording) return;
            const canvas = e.target;
            const rect = canvas.getBoundingClientRect();
            const clickX = (e.clientX - rect.left) * (canvas.width / rect.width);
            const canvasWidth = canvas.width;
            const totalCols = Math.min(recordedColumns, canvasWidth);
            const startCol = columnX; // one past last drawn column

            // Convert pixel to fraction of recording
            // startCol - totalCols is the first column of the recording on canvas
            let offset = (clickX - (startCol - totalCols) + canvasWidth) % canvasWidth;
            if (offset > totalCols) offset = totalCols;
            const fraction = offset / totalCols;

            corrector.seek(fraction);

            // If not playing, start playback from seek point
            if (!corrector.is_playing()) {
                startPlayback();
            }
        }

        allCanvasIds.forEach(id => {
            document.getElementById(id).addEventListener('click', handleCanvasClick);
        });

        // --- Stop button ---
        document.getElementById('stop-btn').addEventListener('click', () => {
            if (isRecording) {
                stopRecording();
            } else {
                stopPlayback();
            }
        });

        document.getElementById('record-btn').addEventListener('click', startRecording);

        document.getElementById('sweep-btn').addEventListener('click', () => {
            const btn = document.getElementById('sweep-btn');
            const active = !btn.classList.contains('active');
            btn.classList.toggle('active');
            btn.textContent = active ? '🎵 Sweep On' : '🎵 Sine Sweep';
            if (corrector) corrector.set_sweep(active);
        });

        // View toggle
        function setupViewToggle(groupId, canvasA, canvasB) {
            document.getElementById(groupId).addEventListener('click', (e) => {
                if (!e.target.dataset.view) return;
                e.target.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                document.getElementById(canvasA).style.display = e.target.dataset.view === 'spectrogram' ? 'block' : 'none';
                document.getElementById(canvasB).style.display = e.target.dataset.view === 'pitch' ? 'block' : 'none';
            });
        }
        setupViewToggle('input-view-group', 'input-spectrogram', 'input-contour');
        setupViewToggle('output-view-group', 'output-spectrogram', 'output-contour');
    </script>
</body>
</html>
